        <div style={{display: "flex", alignItems: "center", gap: 12}}>
          <button onClick={() => setShowRoster(true)}
            style={{border: "1px solid rgba(255,255,255,0.1)", color: "white", background: "transparent", padding: "10px 16px", textTransform: "uppercase", fontWeight: 900, fontSize: 10, letterSpacing: "0.15em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, position: "relative"}}>
            <CartIcon size={16} /> Roster
            {roster.length > 0 && <span style={{position: "absolute", top: -8, right: -8, background: "#E31B23", color: "white", width: 20, height: 20, borderRadius: "50%", fontSize: 10, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center"}}>{roster.length}</span>}
          </button>
          <div style={{display: "flex", border: "1px solid rgba(255,255,255,0.1)"}}>
            <button onClick={() => setViewMode("table")} style={{padding: 10, background: viewMode === "table" ? "rgba(255,255,255,0.1)" : "transparent", color: viewMode === "table" ? "white" : "#64748b", border: "none", cursor: "pointer"}}>
              <TableIcon size={16} />
            </button>
            <button onClick={() => setViewMode("grid")} style={{padding: 10, background: viewMode === "grid" ? "rgba(255,255,255,0.1)" : "transparent", color: viewMode === "grid" ? "white" : "#64748b", border: "none", cursor: "pointer"}}>
              <GridIcon size={16} />
            </button>
          </div>
          <button onClick={() => setView("welcome")}
            style={{border: "1px solid rgba(255,255,255,0.1)", color: "white", background: "transparent", padding: "10px 16px", textTransform: "uppercase", fontWeight: 900, fontSize: 10, letterSpacing: "0.15em", cursor: "pointer", display: "flex", alignItems: "center", gap: 8}}>
            <SettingsIcon size={16} /> Adjust
          </button>
        </div>
      </div>

      <div style={{display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap"}}>
        <div style={{position: "relative", flex: 1, minWidth: 200, maxWidth: 500}}>
          <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search names, keywords, personas..."
            style={{width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "white", fontSize: 12, fontWeight: 600, padding: "12px 12px 12px 36px", outline: "none"}} />
          <div style={{position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", pointerEvents: "none"}}><SearchIcon size={14} /></div>
          {search && <button onClick={() => setSearch("")} style={{position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#64748b", cursor: "pointer", background: "none", border: "none"}}><XIcon size={14} /></button>}
        </div>
        <select value={costType} onChange={e => setCostType(e.target.value)}
          style={{background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "white", fontSize: 12, fontWeight: 600, padding: 12, cursor: "pointer"}}>
          {COST_TYPES.map(c => <option key={c} value={c}>{c === "All" ? "All Cost Types" : c}</option>)}
        </select>
      </div>

      {results.length === 0 ? (
        <div style={{textAlign: "center", padding: "80px 0"}}>
          <SearchIcon size={40} className="" />
          <div style={{color: "#94a3b8", fontWeight: 700, fontSize: 14, marginTop: 12}}>No influencers match your criteria</div>
          <div style={{color: "#475569", fontSize: 12, marginTop: 4}}>Try broadening your filters</div>
        </div>
      ) : viewMode === "table" ? (
        <div style={{background: "#000", border: "1px solid rgba(255,255,255,0.1)", overflowX: "auto"}}>
          <table style={{width: "100%", borderCollapse: "collapse"}}>
            <thead>
              <tr style={{background: "rgba(255,255,255,0.05)", borderBottom: "1px solid rgba(255,255,255,0.1)"}}>
                {["Rank", "Creator", "Region", "Subs", "Views", "Cost", "Score", "Why They Fit", "Links", ""].map(h => (
                  <th key={h} style={{padding: "12px 16px 12px 0", textAlign: "left", fontSize: 9, fontWeight: 900, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.2em", whiteSpace: "nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {results.slice(0, showMore).map((inf, idx) => <InfluencerRow key={inf.n} inf={inf} idx={idx} />)}
            </tbody>
          </table>
          {results.length > showMore && (
            <div style={{textAlign: "center", padding: 16, borderTop: "1px solid rgba(255,255,255,0.05)"}}>
              <button onClick={() => setShowMore(prev => prev + 50)} style={{color: "#E31B23", fontWeight: 700, fontSize: 12, background: "none", border: "1px solid rgba(227,27,35,0.3)", padding: "8px 24px", cursor: "pointer"}}>
                Load More ({results.length - showMore} remaining)
              </button>
            </div>
          )}
        </div>
      ) : (
        <>
          <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16}}>
            {results.slice(0, showMore).map((inf, idx) => <InfluencerCard key={inf.n} inf={inf} />)}
          </div>
          {results.length > showMore && (
            <div style={{textAlign: "center", padding: 16}}>
              <button onClick={() => setShowMore(prev => prev + 50)} style={{color: "#E31B23", fontWeight: 700, fontSize: 12, background: "none", border: "1px solid rgba(227,27,35,0.3)", padding: "8px 24px", cursor: "pointer"}}>
                Load More ({results.length - showMore} remaining)
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );

  return (
    <div style={{minHeight: "100vh", background: "#000", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#e2e8f0", position: "relative", overflow: "hidden"}}>
      <div style={{position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none"}}>
        <div style={{position: "absolute", top: "-30%", left: "-20%", width: "80%", height: "80%", background: "#E31B23", opacity: 0.04, filter: "blur(250px)", borderRadius: "50%"}} />
        <div style={{position: "absolute", bottom: "-30%", right: "-20%", width: "80%", height: "80%", background: "#7C3AED", opacity: 0.04, filter: "blur(250px)", borderRadius: "50%"}} />
      </div>

      <header className="bg-blur" style={{position: "sticky", top: 0, zIndex: 50, width: "100%", borderBottom: "1px solid rgba(255,255,255,0.05)", background: "rgba(0,0,0,0.9)", padding: "16px 24px"}}>
        <div style={{maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between"}}>
          <div style={{display: "flex", alignItems: "center", gap: 24}}>
            <div className="skew-logo" style={{background: "#E31B23", padding: "6px 16px", color: "white", fontWeight: 900, fontStyle: "italic", fontSize: 20}}>EV</div>
            <div style={{height: 24, width: 1, background: "rgba(255,255,255,0.1)"}} />
            <span style={{fontWeight: 900, fontSize: 10, letterSpacing: "0.4em", textTransform: "uppercase", fontStyle: "italic", color: "rgba(255,255,255,0.5)"}}>Influencer Campaign Builder</span>
          </div>
          {view === "results" && (
            <button onClick={() => setShowRoster(!showRoster)}
              style={{display: "flex", alignItems: "center", gap: 8, fontSize: 10, fontWeight: 900, textTransform: "uppercase", letterSpacing: "0.15em", color: "#94a3b8", cursor: "pointer", background: "none", border: "none", position: "relative"}}>
              <CartIcon size={16} />
              <span>Roster</span>
              {roster.length > 0 && <span style={{position: "absolute", top: -8, right: -8, background: "#E31B23", color: "white", width: 16, height: 16, borderRadius: "50%", fontSize: 9, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center"}}>{roster.length}</span>}
            </button>
          )}
        </div>
      </header>

      <main style={{position: "relative", zIndex: 10}}>
        {view === "welcome" && <WelcomeView />}
        {view === "results" && <ResultsView />}
      </main>

      <RosterPanel />
      {showRoster && <div style={{position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 55}} onClick={() => setShowRoster(false)} />}

      <footer style={{marginTop: 64, borderTop: "1px solid rgba(255,255,255,0.05)", padding: "48px 0", position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center"}}>
        <div style={{display: "flex", gap: 32, marginBottom: 16, opacity: 0.3}}>
          <span style={{color: "white", fontWeight: 900, fontStyle: "italic", fontSize: 20, transform: "skewX(-10deg)"}}>EV</span>
          <span style={{color: "white", fontWeight: 900, fontSize: 20, letterSpacing: "-0.05em", textTransform: "uppercase"}}>DYNACORD</span>
        </div>
        <p style={{color: "#334155", fontSize: 10, fontWeight: 900, textTransform: "uppercase", letterSpacing: "0.8em", textAlign: "center"}}>
          Professional Audio Campaign Analytics &bull; 2026
        </p>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
